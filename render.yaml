services:
  - type: web
    name: iv-bag-monitoring
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        value: IVMONITOR123
      - key: DATABASE_URL
        fromDatabase:
          name: iv-bag-db
          property: connectionString

databases:
  - name: iv-bag-db
